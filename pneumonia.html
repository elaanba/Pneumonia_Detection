<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pneumonia Diagnosis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 40px;
            margin: 0;
        }

        h2 {
            text-align: center;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .form-section {
            flex: 1 1 250px;
            max-width: 300px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .form-section h3 {
            text-align: center;
        }

        .form-section select,
        .form-section button {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
            font-size: 14px;
        }

        .custom-upload-btn {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
            margin-top: 10px;
        }

        .custom-upload-btn:hover {
            background-color: #45a049;
        }

        input[type="file"] {
            display: none;
        }

        .image-wrapper {
            flex: 1 1 300px;
            max-width: 400px;
            text-align: center;
        }

        .image-wrapper img {
            width: 100%;
            border-radius: 8px;
        }

        .diagnosis-info {
            margin-top: 15px;
            font-size: 16px;
            color: #333;
        }

        .highlight {
            font-weight: bold;
            color: #4CAF50;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }

            .form-section,
            .image-wrapper {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <h2>Pneumonia Diagnosis</h2>
    <a href="/" style="font-size: 16px; color: #4CAF50; text-decoration: none; margin-bottom: 20px; display: block;">
        &larr; Back to Home
    </a>

    <div class="main-container">

        <!-- Upload form and model info -->
        <div class="form-section">
            <h3>Upload Chest X-ray & Choose Model</h3>
            <form method="POST" enctype="multipart/form-data">
                <label for="image-upload" class="custom-upload-btn">📂 Select X-ray Image</label>
                <input id="image-upload" type="file" name="image" accept="image/*" required>

                <p style="font-size: 13px; color: #555;">
                    Upload a chest X-ray to check for pneumonia.
                </p>

                <select name="model_name" required>
                    {% for model in models %}
                        <option value="{{ model }}" {% if selected_model == model %}selected{% endif %}>{{ model }}</option>
                    {% endfor %}
                </select>

                <button type="submit">Diagnose</button>
            </form>
        </div>

        {% if img_data %}
        <!-- Image and diagnosis -->
        <div class="image-wrapper">
            <img src="data:image/jpeg;base64,{{ img_data }}" alt="X-ray Image">
            <div class="diagnosis-info">
                Diagnosis: <span class="highlight">{{ label }}</span><br>
                Confidence: <span class="highlight">{{ confidence }}</span>
            </div>
        </div>
        {% endif %}

    </div>
</body>
</html>
