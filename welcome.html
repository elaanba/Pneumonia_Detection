<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chest X-ray Diagnostic Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            text-align: center;
            padding-top: 80px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .option {
            background: white;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 220px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            transition: 0.3s ease;
        }
        .option:hover {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Chest X-ray Diagnostic Portal</h1>
    
    <div class="options">
        <a href="/pneumonia" class="option">🫁 Pneumonia Diagnosis</a>
    </div>

</body>
</html>
